<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div id="app-status">Initializing…</div>
    <div id="help-guide" style="display:none">
      <p class="help-title">操作ガイド</p>
      <ul class="help-list">
        <li>タップ &nbsp;— ラップ記録</li>
        <li>ダブルタップ — 保存 / 終了メニュー</li>
        <li>上スワイプ &nbsp;— 一時停止</li>
        <li>下スワイプ &nbsp;— 再開（一時停止中）</li>
      </ul>
    </div>
    <div id="exit-modal" class="exit-modal" style="display:none">
      <p class="exit-modal-title">アプリを終了しますか？</p>
      <div class="exit-modal-btn-row">
        <button id="exit-confirm-btn" class="exit-btn exit-btn-danger">終了</button>
        <button id="exit-cancel-btn" class="exit-btn">キャンセル</button>
      </div>
    </div>
    <div id="stop-modal" class="exit-modal" style="display:none">
      <p class="exit-modal-title">記録を保存しますか？</p>
      <div class="stop-modal-btn-col">
        <button id="stop-save-btn" class="exit-btn exit-btn-primary">保存して終了</button>
        <button id="stop-discard-btn" class="exit-btn exit-btn-danger">保存せずに戻る</button>
        <button id="stop-continue-btn" class="exit-btn">記録を継続</button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
